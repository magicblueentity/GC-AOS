# ANCORATE AOS GRUB Configuration
# For ARM64 UEFI boot

set default=0
set timeout=5
set gfxmode=auto

# Load video modules
insmod all_video
insmod gfxterm

# Set terminal output
terminal_output gfxterm

# ANCORATE AOS boot menu entry
menuentry "ANCORATE AOS" {
    echo "Loading ANCORATE AOS kernel..."

    # Load kernel with multiboot2
    # For ARM64, we use linux command with EFI stub
    linux /EFI/BOOT/kernel.elf root=/dev/nvme0n1p2 console=ttyS0,115200 console=tty0

    # Load initial ramdisk if present
    # initrd /EFI/BOOT/initrd.img

    echo "Booting..."
}

menuentry "ANCORATE AOS (Safe Mode)" {
    echo "Loading ANCORATE AOS in safe mode..."

    linux /EFI/BOOT/kernel.elf root=/dev/nvme0n1p2 console=ttyS0,115200 single nosmp

    echo "Booting..."
}

menuentry "ANCORATE AOS (Debug Mode)" {
    echo "Loading ANCORATE AOS with debugging..."

    linux /EFI/BOOT/kernel.elf root=/dev/nvme0n1p2 console=ttyS0,115200 debug earlyprintk=serial

    echo "Booting..."
}

menuentry "Reboot" {
    reboot
}

menuentry "Shutdown" {
    halt
}
