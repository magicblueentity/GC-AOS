# GC AOS GRUB Configuration
# For x86_64 GRUB/Multiboot2 boot

set default=0
set timeout=5
set gfxmode=auto

# Load video modules
insmod all_video
insmod gfxterm

terminal_output gfxterm

menuentry "GC AOS" {
    echo "Loading GC AOS x86_64 kernel..."
    multiboot2 /boot/gc-aos-x86_64.elf
    boot
}

menuentry "GC AOS (Safe Mode)" {
    echo "Loading GC AOS x86_64 (safe mode)..."
    multiboot2 /boot/gc-aos-x86_64.elf single nosmp
    boot
}

menuentry "GC AOS (Debug Mode)" {
    echo "Loading GC AOS x86_64 (debug mode)..."
    multiboot2 /boot/gc-aos-x86_64.elf debug verbose
    boot
}

menuentry "Reboot" {
    reboot
}

menuentry "Shutdown" {
    halt
}
